# ──────────────────────────────────────────────────────────────────
# Local development compose (Phase 10.4)
#
# Spins up:
#   - redis   (BullMQ queues + presence cache)
#   - api     (web tier, hot-reload via volume mount + tsx watch)
#   - worker  (queue consumers, hot-reload too)
#
# Postgres comes from Supabase Cloud (not run here) — set SUPABASE_*
# in a .env file at the repo root. Docker compose auto-loads .env.
#
# Usage:
#   docker compose up
#   docker compose run --rm api npm test
# ──────────────────────────────────────────────────────────────────

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    image: node:20-bookworm-slim
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    ports:
      - "5001:5001"
    environment:
      NODE_ENV: development
      PORT: '5001'
      UPSTASH_REDIS_URL: redis://redis:6379
      QUEUE_ENABLED: 'true'
      QUEUE_PREFIX: gum-dev
      PAYOUT_GATEWAY: disabled
      METRICS_ENABLED: 'true'
      PUPPETEER_SKIP_DOWNLOAD: 'true'
      # Inherit the rest from the repo .env (Supabase keys, Bunny keys, etc.)
    env_file:
      - .env
    volumes:
      - .:/app
      - api_node_modules:/app/node_modules
    depends_on:
      redis:
        condition: service_healthy

  worker:
    image: node:20-bookworm-slim
    working_dir: /app
    command: sh -c "npm install && npm run worker:dev"
    environment:
      NODE_ENV: development
      UPSTASH_REDIS_URL: redis://redis:6379
      QUEUE_ENABLED: 'true'
      QUEUE_PREFIX: gum-dev
      PAYOUT_GATEWAY: disabled
      PUPPETEER_SKIP_DOWNLOAD: 'true'
    env_file:
      - .env
    volumes:
      - .:/app
      - worker_node_modules:/app/node_modules
    depends_on:
      redis:
        condition: service_healthy

volumes:
  api_node_modules:
  worker_node_modules:
